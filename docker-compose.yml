services:
  backlogged:
    build: .
    container_name: backlogged
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - backlogged_data:/app/data
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/backlogged.db
      CONFIG_PATH: /app/data/config.json
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env — generate with: openssl rand -hex 32}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  backlogged_data:
